<div class="welcome text-center bg-[#f6f6f6] my-8 w-2/4 mx-auto rounded-3xl p-3">
  <p class="text-3xl">Benvenuto in Gestionale Dipendenti</p>
  <p class="welcome-subtitle text-sm mt-4">Visualizza, modifica o elimina dipendenti!</p>
</div>

<div class="cards grid grid-cols-2 gap-6 mx-auto w-3/5 mb-4">
  @for (card of cards; track card.label) {
    <app-home-card
      [label]="card.label"
      [subtitle]="card.subtitle"
      [icon]="card.icon"
      [route]="card.route"
    />
  }
</div>
